<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChambaYa — Mis tareas</title>
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../styles.css">
<style>

/* ══ LAYOUT GENERAL ══ */
.mt-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 36px 32px 80px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 28px;
  align-items: start;
}

/* ══ SIDEBAR IZQUIERDO ══ */
.mt-sidebar {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  border: 1.5px solid var(--borde);
  box-shadow: var(--sombra);
  overflow: hidden;
  position: sticky;
  top: 86px;
}

.mt-sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1.5px solid var(--borde);
}
.mt-sidebar-titulo {
  font-size: .72rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--suave);
  margin-bottom: 12px;
}
.mt-search {
  position: relative;
}
.mt-search-ico {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: .95rem;
  color: var(--suave);
}
.mt-search input {
  width: 100%;
  background: var(--fondo);
  border: 1.5px solid var(--borde);
  border-radius: var(--radio-pill);
  padding: 9px 12px 9px 34px;
  font-family: 'Nunito', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  color: var(--texto);
  outline: none;
  transition: border-color .2s;
}
.mt-search input:focus { border-color: var(--verde); }
.mt-search input::placeholder { color: #CBD5E1; }

/* Tabs filtro */
.mt-tabs {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mt-tab {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-radius: var(--radio);
  cursor: pointer;
  transition: all .15s;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: 'Nunito', sans-serif;
  font-size: .88rem;
  font-weight: 800;
  color: var(--suave);
}
.mt-tab:hover { background: var(--fondo); color: var(--texto); }
.mt-tab.activo { background: var(--verde-c); color: var(--verde-o); }
.mt-tab-left { display: flex; align-items: center; gap: 10px; }
.mt-tab-ico { font-size: 1rem; }
.mt-badge {
  background: var(--borde);
  color: var(--suave);
  font-size: .7rem;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: var(--radio-pill);
  min-width: 22px;
  text-align: center;
}
.mt-tab.activo .mt-badge { background: var(--verde); color: #fff; }

/* ══ CONTENIDO PRINCIPAL ══ */
.mt-main {}

/* Header */
.mt-main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.mt-main-titulo {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -.3px;
}
.mt-main-sub {
  font-size: .82rem;
  font-weight: 700;
  color: var(--suave);
  margin-top: 2px;
}
.btn-nueva-tarea {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--verde);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: .88rem;
  padding: 10px 20px;
  border-radius: var(--radio-pill);
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
  flex-shrink: 0;
}
.btn-nueva-tarea:hover { background: var(--verde-o); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,196,107,.3); }

/* Lista de tareas */
.mt-lista {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Card de tarea */
.mt-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  border: 1.5px solid var(--borde);
  box-shadow: var(--sombra);
  padding: 22px 24px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
}
.mt-card:hover {
  border-color: var(--verde);
  transform: translateY(-2px);
  box-shadow: var(--sombra-lg);
}
.mt-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--borde);
  transition: background .2s;
}
.mt-card.activa::before  { background: var(--verde); }
.mt-card.en-curso::before { background: var(--naranja); }
.mt-card.terminada::before { background: var(--azul); }
.mt-card.cancelada::before { background: var(--suave); }

.mt-card-inner {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}
.mt-card-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--radio);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
  background: var(--fondo);
}
.mt-card-body { flex: 1; min-width: 0; }

.mt-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.mt-card-titulo {
  font-size: 1rem;
  font-weight: 900;
  color: var(--texto);
  line-height: 1.3;
}
.mt-card-precio {
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--verde-o);
  flex-shrink: 0;
  white-space: nowrap;
}

.mt-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 14px;
}
.mt-meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .8rem;
  font-weight: 800;
  color: var(--suave);
}

/* Estado + tasker */
.mt-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.estado-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radio-pill);
  font-size: .78rem;
  font-weight: 900;
}
.ep-activa    { background: var(--verde-c);   color: var(--verde-o); }
.ep-en-curso  { background: var(--naranja-c); color: #C2410C; }
.ep-terminada { background: var(--azul-c);    color: #1D4ED8; }
.ep-cancelada { background: var(--fondo);     color: var(--suave); }

.ofertas-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .8rem;
  font-weight: 900;
  color: var(--suave);
}
.ofertas-pill.hay { color: var(--verde-o); }

/* Tasker asignado */
.tasker-asignado {
  display: flex;
  align-items: center;
  gap: 8px;
}
.tasker-mini-av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--fondo);
  border: 2px solid var(--borde);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .78rem;
  font-weight: 900;
  color: var(--suave);
  overflow: hidden;
  flex-shrink: 0;
}
.tasker-mini-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.tasker-mini-info {}
.tasker-mini-nombre { font-size: .8rem; font-weight: 900; color: var(--texto); }
.tasker-mini-sub    { font-size: .7rem; font-weight: 700; color: var(--suave); }

/* Card terminada especial */
.mt-card.terminada .mt-card-icon { background: var(--azul-c); }

/* EMPTY STATE */
.mt-empty {
  text-align: center;
  padding: 64px 32px;
  background: var(--blanco);
  border-radius: var(--radio-lg);
  border: 1.5px solid var(--borde);
}
.mt-empty-ico { font-size: 3rem; margin-bottom: 16px; }
.mt-empty-titulo { font-size: 1.1rem; font-weight: 900; margin-bottom: 8px; }
.mt-empty-sub { font-size: .9rem; font-weight: 700; color: var(--suave); margin-bottom: 24px; max-width: 320px; margin-left: auto; margin-right: auto; }

/* SKELETON */
.skel-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  border: 1.5px solid var(--borde);
  padding: 22px 24px;
  display: flex;
  gap: 18px;
}
.sk { background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* SPINNER */
.spinner-wrap { text-align: center; padding: 48px 0; }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--borde); border-top-color: var(--verde); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 820px) {
  .mt-wrap { grid-template-columns: 1fr; padding: 20px 16px 60px; }
  .mt-sidebar { position: static; }
  .mt-tabs { flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 12px; }
  .mt-tab { width: auto; padding: 8px 14px; }
}
</style>
</head>

<script>
// db ya disponible desde navbar.js

// db ya disponible desde navbar.js

const CAT_ICONS = { limpieza:'🧹', plomeria:'🔧', pintura:'🎨', electricidad:'⚡', jardin:'🌿', mudanza:'📦', carpinteria:'🔨', tecnologia:'🖥️', mandados:'🛵', generico:'📋' };
const CAT_BG = { limpieza:'#D1FAE5', plomeria:'#E0F2FE', pintura:'#FCE7F3', electricidad:'#FEF9C3', jardin:'#D1FAE5', mudanza:'#E0E7FF', carpinteria:'#FEF3C7', tecnologia:'#EFF6FF', mandados:'#FFE4E6', generico:'#F1F5F9' };

let todasTareas = [];
let tabActual = 'todas';
let busqueda = '';

// ══ DEMOS para cuando no hay tareas reales ══
const DEMO_TAREAS = [
  { id:'demo-1', titulo:'Limpiar departamento 2 ambientes', categoria:'limpieza', cuando:'El 5 de abril de 2026', zona:'Buenos Aires (Palermo)', cp:'1425', presupuesto:12000, estado:'activa', created_at: new Date(Date.now()-86400000*2).toISOString(), ofertas_count:3, tasker:null },
  { id:'demo-2', titulo:'Arreglar canilla cocina', categoria:'plomeria', cuando:'El 2 de abril de 2026', zona:'Buenos Aires (Belgrano)', cp:'1428', presupuesto:8000, estado:'en-curso', created_at: new Date(Date.now()-86400000*5).toISOString(), ofertas_count:2, tasker:{ nombre:'Roberto M.', avatar_url:null, pactado:'El 2 de abril' } },
  { id:'demo-3', titulo:'Pintar living y comedor', categoria:'pintura', cuando:'El 20 de marzo de 2026', zona:'Buenos Aires (Caballito)', cp:'1405', presupuesto:25000, estado:'terminada', created_at: new Date(Date.now()-86400000*15).toISOString(), ofertas_count:5, tasker:{ nombre:'Ana L.', avatar_url:null, pactado:'El 20 de marzo' } },
  { id:'demo-4', titulo:'Cortar pasto jardín trasero', categoria:'jardin', cuando:'Soy flexible', zona:'GBA Norte', cp:'1642', presupuesto:5000, estado:'activa', created_at: new Date(Date.now()-86400000).toISOString(), ofertas_count:0, tasker:null },
  { id:'demo-5', titulo:'Instalación aire acondicionado split', categoria:'electricidad', cuando:'Antes del 10 de abril', zona:'Buenos Aires (Almagro)', cp:'1424', presupuesto:18000, estado:'cancelada', created_at: new Date(Date.now()-86400000*20).toISOString(), ofertas_count:1, tasker:null },
];

// ══ INIT ══
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }

  await cargarTareas(session.user.id);
})();

async function cargarTareas(userId) {
  try {
    const { data, error } = await db
      .from('tareas')
      .select('*, ofertas(count)')
      .eq('user_id', userId)
      .order('created_at', { ascending: false });

    quitarSkeletons();

    if (error || !data || data.length === 0) {
      // Sin tareas reales: mostrar estado vacío
      todasTareas = [];
    } else {
      // Enriquecer con conteo de ofertas
      todasTareas = data.map(t => ({
        ...t,
        ofertas_count: t.ofertas?.[0]?.count || 0
      }));
    }

    actualizarBadges();
    renderLista();
  } catch (e) {
    console.warn('Supabase:', e.message);
    quitarSkeletons();
    todasTareas = [];
    actualizarBadges();
    renderLista();
  }
}

function quitarSkeletons() {
  ['skel-1','skel-2','skel-3'].forEach(id => {
    document.getElementById(id)?.remove();
  });
}

function actualizarBadges() {
  const estados = ['activa','en-curso','terminada','cancelada'];
  const total = todasTareas.length;
  document.getElementById('badge-todas').textContent = total;
  estados.forEach(e => {
    document.getElementById('badge-'+e).textContent = todasTareas.filter(t => t.estado === e).length;
  });
}

// ══ RENDER ══
function renderLista() {
  const lista = document.getElementById('mt-lista');
  const titulos = { todas:'Todas mis tareas', activa:'Tareas activas', 'en-curso':'Tareas en curso', terminada:'Tareas terminadas', cancelada:'Tareas canceladas' };
  document.getElementById('main-titulo').textContent = titulos[tabActual] || 'Mis tareas';

  let filtradas = tabActual === 'todas' ? todasTareas : todasTareas.filter(t => t.estado === tabActual);
  if (busqueda) {
    filtradas = filtradas.filter(t => t.titulo.toLowerCase().includes(busqueda.toLowerCase()));
  }

  document.getElementById('main-sub').textContent = filtradas.length + ' tarea' + (filtradas.length !== 1 ? 's' : '');

  if (!filtradas.length) {
    lista.innerHTML = renderEmpty();
    return;
  }

  lista.innerHTML = filtradas.map(t => renderCard(t)).join('');
}

function renderCard(t) {
  const icon = CAT_ICONS[t.categoria] || '📋';
  const bg   = CAT_BG[t.categoria]   || '#F1F5F9';
  const precio = t.presupuesto > 0 ? '$' + Number(t.presupuesto).toLocaleString('es-AR') : 'A convenir';

  const fecha = new Date(t.created_at);
  const fechaStr = fecha.toLocaleDateString('es-AR', { day:'numeric', month:'short', year:'numeric' });

  // Estado pill
  const estadoMap = {
    activa:    { cls:'ep-activa',    ico:'🟢', txt:'Activa' },
    'en-curso':{ cls:'ep-en-curso',  ico:'🔄', txt:'En curso' },
    terminada: { cls:'ep-terminada', ico:'✅', txt:'Terminada' },
    cancelada: { cls:'ep-cancelada', ico:'❌', txt:'Cancelada' },
  };
  const estadoInfo = estadoMap[t.estado] || estadoMap.activa;

  // Footer derecho: tasker asignado O cantidad de ofertas
  let footerDer = '';
  if (t.tasker && (t.estado === 'en-curso' || t.estado === 'terminada')) {
    const ini = t.tasker.nombre.charAt(0).toUpperCase();
    const av = t.tasker.avatar_url
      ? `<img src="${t.tasker.avatar_url}" alt="${t.tasker.nombre}">`
      : ini;
    footerDer = `
      <div class="tasker-asignado">
        <div class="tasker-mini-av">${av}</div>
        <div class="tasker-mini-info">
          <div class="tasker-mini-nombre">${t.tasker.nombre}</div>
          <div class="tasker-mini-sub">${t.estado === 'terminada' ? 'Completó la tarea' : 'Pactado: ' + (t.tasker.pactado || t.cuando)}</div>
        </div>
      </div>`;
  } else if (t.estado === 'activa') {
    const hay = t.ofertas_count > 0;
    footerDer = `<div class="ofertas-pill ${hay ? 'hay' : ''}">
      ${hay ? '💬' : '⏳'} ${hay ? t.ofertas_count + ' oferta' + (t.ofertas_count !== 1 ? 's' : '') : 'Sin ofertas aún'}
    </div>`;
  }

  return `
    <a href="tarea.html?id=${t.id}" class="mt-card ${t.estado}">
      <div class="mt-card-inner">
        <div class="mt-card-icon" style="background:${bg}">${icon}</div>
        <div class="mt-card-body">
          <div class="mt-card-top">
            <div class="mt-card-titulo">${escHTML(t.titulo)}</div>
            <div class="mt-card-precio">${precio}</div>
          </div>
          <div class="mt-card-meta">
            <div class="mt-meta-item">📅 ${escHTML(t.fecha || t.cuando || '—')}</div>
            <div class="mt-meta-item">📍 ${escHTML(t.zona || t.cp || '—')}</div>
            <div class="mt-meta-item">🕐 Publicada el ${fechaStr}</div>
          </div>
          <div class="mt-card-footer">
            <span class="estado-pill ${estadoInfo.cls}">${estadoInfo.ico} ${estadoInfo.txt}</span>
            ${footerDer}
          </div>
        </div>
      </div>
    </a>`;
}

function renderEmpty() {
  const msgs = {
    todas:    { ico:'📋', tit:'No publicaste ninguna tarea', sub:'Publicá tu primera tarea y recibí ofertas de taskers verificados.' },
    activa:   { ico:'🟢', tit:'No tenés tareas activas',    sub:'Publicá una nueva tarea para recibir ofertas.' },
    'en-curso':{ ico:'🔄', tit:'No tenés tareas en curso',  sub:'Cuando aceptes una oferta, la tarea va a aparecer acá.' },
    terminada:{ ico:'✅', tit:'No tenés tareas terminadas', sub:'Las tareas completadas van a aparecer acá.' },
    cancelada:{ ico:'❌', tit:'No tenés tareas canceladas', sub:'Menos mal — ninguna cancelación por ahora.' },
  };
  const m = msgs[tabActual] || msgs.todas;
  return `
    <div class="mt-empty">
      <div class="mt-empty-ico">${m.ico}</div>
      <div class="mt-empty-titulo">${m.tit}</div>
      <div class="mt-empty-sub">${m.sub}</div>
      <a href="publicar.html" class="btn-nueva-tarea" style="display:inline-flex">+ Publicar tarea</a>
    </div>`;
}

// ══ FILTROS ══
function cambiarTab(tab) {
  tabActual = tab;
  document.querySelectorAll('.mt-tab').forEach(t => t.classList.remove('activo'));
  document.getElementById('tab-' + tab)?.classList.add('activo');
  renderLista();
}

function filtrarBusqueda(val) {
  busqueda = val.trim();
  renderLista();
}

function escHTML(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
</body>
